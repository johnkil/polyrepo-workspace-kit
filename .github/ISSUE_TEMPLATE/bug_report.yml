name: Bug report
description: Report a reproducible problem with wkit or the workspace model.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not include secrets, private repository contents, or unpublished vulnerability details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the smallest command sequence or workspace snippet that reproduces the issue.
      placeholder: |
        1. Run `wkit ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Workspace manifests
        - Repo bindings
        - Changes
        - Scenarios
        - Install/adapters
        - Validation
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: wkit version or commit
      placeholder: "v0.1.0 or commit SHA"
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 2025, ..."
  - type: input
    id: go
    attributes:
      label: Go version
      placeholder: "go version"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
