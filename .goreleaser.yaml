# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: wkit

gomod:
  proxy: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy -diff
    - go test ./...

builds:
  - id: wkit
    main: ./cmd/wkit
    binary: wkit
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/johnkil/polyrepo-workspace-kit/internal/buildinfo.Version={{ .Version }}
      - -X github.com/johnkil/polyrepo-workspace-kit/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/johnkil/polyrepo-workspace-kit/internal/buildinfo.Date={{ .CommitDate }}
      - -X github.com/johnkil/polyrepo-workspace-kit/internal/buildinfo.Dirty={{ .IsGitDirty }}
      - -X github.com/johnkil/polyrepo-workspace-kit/internal/buildinfo.BuiltBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - ids:
      - wkit
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - CHANGELOG.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-snapshot"

changelog:
  disable: true

release:
  draft: true
  name_template: "{{ .Tag }}"
